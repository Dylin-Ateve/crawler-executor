apiVersion: v1
kind: ConfigMap
metadata:
  name: crawler-executor-config
  labels:
    app.kubernetes.io/name: crawler-executor
    app.kubernetes.io/component: fetch-worker
data:
  # Environment-specific values should be rendered from deploy/environments/*.env
  # with deploy/scripts/render-k8s-configmap-from-env.sh before applying.
  fetch_queue_backend: redis_streams
  fetch_queue_stream: crawl:tasks
  fetch_queue_group: crawler-executor
  fetch_queue_consumer_template: ${NODE_NAME}-${POD_NAME}
  fetch_queue_read_count: "10"
  fetch_queue_block_ms: "1000"
  fetch_queue_max_deliveries: "3"
  fetch_queue_claim_min_idle_ms: "600000"
  fetch_queue_shutdown_drain_seconds: "25"
  fetch_queue_max_messages: "0"
  concurrent_requests: "64"
  concurrent_requests_per_domain: "4"
  download_delay: "0.1"
  download_timeout: "30"
  retry_enabled: "true"
  retry_times: "2"
  force_close_connections: "true"
  crawl_interface: enp0s5
  excluded_local_ips: ""
  local_ip_pool: ""
  ip_selection_strategy: STICKY_POOL
  ip_failure_threshold: "5"
  ip_failure_window_seconds: "300"
  ip_cooldown_seconds: "1800"
  egress_selection_strategy: STICKY_POOL
  sticky_pool_size: "4"
  egress_identity_source: auto
  egress_identity_map_file: ""
  egress_identity_hash_salt: production-egress-v1
  allow_bind_ip_as_egress_identity: "true"
  host_ip_min_delay_ms: "2000"
  host_ip_jitter_ms: "500"
  host_ip_backoff_base_ms: "5000"
  host_ip_backoff_max_ms: "300000"
  host_ip_backoff_multiplier: "2.0"
  host_slowdown_seconds: "600"
  host_slowdown_factor: "3.0"
  local_delayed_buffer_capacity: "100"
  max_local_delay_seconds: "300"
  local_delayed_buffer_poll_ms: "500"
  stop_reading_when_delayed_buffer_full: "true"
  soft_ban_window_seconds: "300"
  host_ip_soft_ban_threshold: "2"
  ip_cross_host_challenge_threshold: "3"
  host_cross_ip_challenge_threshold: "3"
  http_429_weight: "3"
  captcha_challenge_weight: "5"
  anti_bot_200_weight: "4"
  http_5xx_weight: "1"
  timeout_weight: "1"
  challenge_body_patterns: ""
  anti_bot_200_patterns: ""
  runtime_policy_provider: file
  runtime_policy_file: /etc/crawler/runtime/runtime_policy.json
  runtime_policy_reload_interval_seconds: "5"
  runtime_policy_lkg_max_age_seconds: "3600"
  runtime_policy: '{"schema_version":"1.0","version":"policy-bootstrap","generated_at":"2026-05-03T10:00:00Z","default_policy":{"enabled":true,"paused":false,"egress_selection_strategy":"STICKY_POOL","sticky_pool_size":4,"host_ip_min_delay_ms":2000,"host_ip_jitter_ms":500,"download_timeout_seconds":30,"max_retries":2,"max_local_delay_seconds":300}}'
  execution_state_redis_url: ""
  execution_state_redis_prefix: crawler:exec:safety
  execution_state_max_ttl_seconds: "86400"
  execution_state_write_enabled: "true"
  execution_state_fail_open: "true"
  asn_observability_enabled: "false"
  asn_database_path: ""
  host_asn_soft_limit_enabled: "false"
  redis_key_prefix: crawler
  enable_p1_persistence: "true"
  object_storage_provider: oci
  oci_object_storage_bucket: CHANGE_ME_BUCKET
  oci_object_storage_namespace: CHANGE_ME_NAMESPACE
  oci_object_storage_region: us-phoenix-1
  oci_object_storage_endpoint: https://objectstorage.us-phoenix-1.oraclecloud.com
  oci_auth_mode: instance_principal
  content_compression: gzip
  kafka_bootstrap_servers: CHANGE_ME_BOOTSTRAP_SERVERS
  kafka_security_protocol: SASL_SSL
  kafka_sasl_mechanism: SCRAM-SHA-512
  kafka_ssl_ca_location: /etc/ssl/certs/ca-certificates.crt
  kafka_topic_crawl_attempt: crawler.crawl-attempt.v1
  kafka_batch_size: "100"
  kafka_producer_retries: "3"
  kafka_request_timeout_ms: "30000"
  kafka_delivery_timeout_ms: "120000"
  kafka_flush_timeout_ms: "130000"
  prometheus_port: "9410"
  health_port: "9411"
  readiness_max_heartbeat_age_seconds: "30"
  log_level: INFO
  crawler_paused: "false"
  crawler_pause_poll_seconds: "5"
  crawler_debug_mode: "false"
  debug_fetch_queue_stream_template: crawl:tasks:debug:{node_name}
  debug_fetch_queue_group_template: crawler-executor-debug:{node_name}
  debug_fetch_queue_consumer_template: ${NODE_NAME}-${POD_NAME}-debug
  debug_attempt_tier: debug
