apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: crawler-executor
  labels:
    app.kubernetes.io/name: crawler-executor
    app.kubernetes.io/component: fetch-worker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: crawler-executor
      app.kubernetes.io/component: fetch-worker
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crawler-executor
        app.kubernetes.io/component: fetch-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9410"
        prometheus.io/path: /metrics
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: regcred
      nodeSelector:
        scrapy-egress: "true"
      tolerations:
        - key: scrapy-egress
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: crawler-executor
          image: crawler-executor:CHANGE_ME
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "scrapy", "crawl", "fetch_queue"]
          ports:
            - name: metrics
              containerPort: 9410
              hostPort: 9410
              protocol: TCP
            - name: health
              containerPort: 9411
              hostPort: 9411
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: health
              host: 127.0.0.1
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: health
              host: 127.0.0.1
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "6Gi"
          volumeMounts:
            - name: crawler-runtime-config
              mountPath: /etc/crawler/runtime
              readOnly: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: FETCH_QUEUE_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: crawler-executor-redis
                  key: fetch_queue_redis_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: crawler-executor-redis
                  key: redis_url
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: crawler-executor-kafka
                  key: username
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crawler-executor-kafka
                  key: password
            - name: FETCH_QUEUE_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: fetch_queue_backend
            - name: FETCH_QUEUE_STREAM
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: fetch_queue_stream
            - name: FETCH_QUEUE_GROUP
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: fetch_queue_group
            - name: FETCH_QUEUE_CONSUMER_TEMPLATE
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: fetch_queue_consumer_template
            - name: FETCH_QUEUE_READ_COUNT
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: fetch_queue_read_count
            - name: FETCH_QUEUE_BLOCK_MS
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: fetch_queue_block_ms
            - name: FETCH_QUEUE_MAX_DELIVERIES
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: fetch_queue_max_deliveries
            - name: FETCH_QUEUE_CLAIM_MIN_IDLE_MS
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: fetch_queue_claim_min_idle_ms
            - name: FETCH_QUEUE_SHUTDOWN_DRAIN_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: fetch_queue_shutdown_drain_seconds
            - name: FETCH_QUEUE_MAX_MESSAGES
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: fetch_queue_max_messages
            - name: CONCURRENT_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: crawler-executor-config
                  key: concurrent_requests
            - name: CONCURRENT_REQUESTS_PER_DOMAIN
              valueFrom:
